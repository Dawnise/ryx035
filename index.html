        /* 基本样式 */
body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    font-family: 'Arial', sans-serif;
}

/* 容器 */
.container {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 1200px;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
}

/* 顶部滑动窗口 */
.top-section {
    top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
}

/* 右上角按钮 */
.top-left-button {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 10px 20px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}

.bottom-right-place {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background-color: rgb(183, 222, 246);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 10px 20px;
    border-radius: 5px;
    transition: background-color 0.3s ease;

}

.top-right-button:hover {
    background-color: rgba(0, 0, 0, 0.7);
}

.image-slider {
    width: 100%;
    position: relative;
    height: 300px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    object-fit: cover;
}

.slides {
    display: flex;
    transition: transform 0.5s ease-in-out;
}

.slide {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 保持图片比例并完全显示 */
    border-radius: 10px;
}

/* 箭头按钮 */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 24px;
    padding: 10px;
    border-radius: 50%;
    z-index: 1000;
    transition: background-color 0.3s ease;
}

.arrow:hover {
    background-color: rgba(0, 0, 0, 0.7);
}

/* 左箭头 */
.left-arrow {
    left: 10px;
}

/* 右箭头 */
.right-arrow {
    right: 10px;
}

/* 内容区域 */
.content {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* 头部 */
.header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.date-text {
    display: flex;
    flex-direction: column;
    color: white;
    font-size: 18px;
    font-weight: bold;
}

.date {
    margin-bottom: 5px;
}

.text {
    margin-bottom: 5px;
}

/* 中间部分 */
.middle-section {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* 侧边栏 */
.left-sidebar, .right-sidebar {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 18px;
    font-weight: bold;
    background-color: rgba(0, 0, 0, 0.5);
    padding: 20px;
    border-radius: 10px;
    height: 400px; /* 文本高度比视频框架高 */
}

/* 滚动文本 */
.marquee-content {
    height: 100%;
    overflow: hidden;
    position: relative;
    white-space: nowrap;
    animation: marquee 10s linear infinite;
}

@keyframes marquee {
    0% {
        transform: translateX(100%);
    }
    100% {
        transform: translateX(-100%);
    }
}

/* 视频容器 */
.video-container {
    flex: 2;
    margin-top: 20px;
}

.video-container video {
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

        <script>
            let slideIndex = 0;

function showSlides(n) {
    const slides = document.querySelectorAll('.slide');
    if (n >= slides.length) { slideIndex = 0; }
    if (n < 0) { slideIndex = slides.length - 1; }
    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }
    slides[slideIndex].style.display = "block";
    slideIndex += n;
}

function nextSlide() {
    showSlides(slideIndex + 1);
}

function prevSlide() {
    showSlides(slideIndex - 1);
}

// 初始化显示第一张图片
showSlides(slideIndex);
